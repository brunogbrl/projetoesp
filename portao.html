<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Acesso</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 90%;
            width: 380px;
            box-sizing: border-box;
        }
        .status {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            transition: color 0.3s ease;
        }
        .detalhes {
            font-size: 1rem;
            color: #555;
            line-height: 1.5;
            min-height: 60px;
        }
        .btn-fechar {
            display: none;
            margin: 20px auto 0 auto;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background-color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transition: background-color 0.2s;
        }
        .btn-fechar:active {
            background-color: #555;
        }
        .timer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
    <script>
        // --- 1. CONFIGURAÇÕES DE DIRETÓRIO SECRETO (COORDENADAS DE CASA) ---
        const configKey = "LTIwLjY2NTY2MjY=";    // Latitude (-20.6656626) em Base64
        const configParam = "LTQzLjc3ODkyODk=";  // Longitude (-43.7789289) em Base64
        
        const DISTANCIA_MAX_METROS = 40; // Raio de tolerância do GPS

        // --- 2. CONFIGURAÇÃO DE ENDPOINT ---
        const configId = "aHR0cHM6Ly93ZWJob29rcy52b2ljZW1vbmtleS5pby9jYXRjaC9hYzA4NTVhMDk5MGY1ODIyNmJkOTIyZTNlNmFhY2RmYi82NmM2NGE4MzUx"; 

        // Função para calcular a distância física em metros (Fórmula de Haversine)
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Raio da Terra em metros
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; 
        }

        // Exibe o status final na tela e gerencia o fechamento
        function atualizarPainel(titulo, descricao, corHex, segundosParaFechar) {
            document.getElementById('status-title').innerText = titulo;
            document.getElementById('status-title').style.color = corHex;
            document.getElementById('status-details').innerText = descricao;
            
            // Mostra o botão físico de fechar (caso o window.close() automático seja bloqueado)
            const btn = document.getElementById('btn-close');
            btn.style.display = 'block';
            btn.style.backgroundColor = corHex;

            const timerElement = document.getElementById('timer');

            // Se for sucesso (delay mínimo de segurança de 0.8s)
            if (segundosParaFechar === 0) {
                timerElement.innerText = "Finalizando conexão...";
                setTimeout(() => {
                    window.close();
                }, 800); 
                return;
            }

            // Se for negado/erro (com contagem regressiva de 3s)
            let tempoRestante = segundosParaFechar;
            timerElement.innerText = `Fechando aba em ${tempoRestante}s...`;

            const contagemRegressiva = setInterval(() => {
                tempoRestante--;
                if (tempoRestante <= 0) {
                    clearInterval(contagemRegressiva);
                    timerElement.innerText = "Você pode fechar esta aba no botão acima.";
                    window.close();
                } else {
                    timerElement.innerText = `Fechando aba em ${tempoRestante}s...`;
                }
            }, 1000);
        }

        function validarEAbrir() {
            if (!navigator.geolocation) {
                atualizarPainel(
                    "Sistema Incompatível", 
                    "Este navegador de internet não possui suporte para serviços de localização.", 
                    "#d9534f", 
                    3
                );
                return;
            }

            // Solicita a localização com precisão máxima
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;

                    // Decodifica as coordenadas secretas em tempo de execução
                    const targetLat = parseFloat(atob(configKey));
                    const targetLon = parseFloat(atob(configParam));

                    const distancia = calcularDistancia(userLat, userLon, targetLat, targetLon).toFixed(1);

                    if (distancia <= DISTANCIA_MAX_METROS) {
                        // 1. Identifica quem está abrindo a partir dos parâmetros da URL
                        const urlParams = new URLSearchParams(window.location.search);
                        const usuario = urlParams.get('user') || 'desconhecido';

                        // Atualiza o painel para fechar após o delay mínimo de sucesso
                        atualizarPainel(
                            "Acesso Liberado!", 
                            `Olá, ${usuario}! Comando enviado.`, 
                            "#2b9348", 
                            0
                        );

                        // 2. Monta o endpoint e dispara
                        let endpoint = atob(configId);
                        if (endpoint.includes('?')) {
                            endpoint += `&p1=${encodeURIComponent(usuario)}`;
                        } else {
                            endpoint += `?p1=${encodeURIComponent(usuario)}`;
                        }

                        // Dispara a requisição e tenta fechar imediatamente após a resposta (ou erro)
                        fetch(endpoint, { mode: 'no-cors' })
                            .then(() => { setTimeout(() => { window.close(); }, 800); })
                            .catch(() => { setTimeout(() => { window.close(); }, 800); });
                    } else {
                        // Se estiver longe, bloqueia e exibe contagem de 3s
                        atualizarPainel(
                            "Acesso Negado", 
                            `Distância atual: ${distancia}m. Limite: ${DISTANCIA_MAX_METROS}m.`, 
                            "#d9534f", 
                            3
                        );
                    }
                },
                (error) => {
                    let motivo = "Não foi possível obter sua localização.";
                    if (error.code === error.PERMISSION_DENIED) {
                        motivo = "A permissão de localização foi negada.";
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        motivo = "Sinal de GPS indisponível.";
                    } else if (error.code === error.TIMEOUT) {
                        motivo = "Tempo limite do GPS excedido.";
                    }

                    atualizarPainel(
                        "Falha de GPS", 
                        motivo, 
                        "#e07a5f", 
                        3
                    );
                },
                { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
            );
        }
    </script>
</head>
<body onload="validarEAbrir()">
    <div class="card">
        <div id="status-title" class="status" style="color: #0275d8;">Verificando...</div>
        <div id="status-details" class="detalhes">Solicitando coordenadas ao GPS...</div>
        
        <button id="btn-close" class="btn-fechar" onclick="window.close()">Fechar Aba</button>
        
        <div id="timer" class="timer">Iniciando protocolo de segurança...</div>
    </div>
</body>
</html>
