<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Portão</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background-color: #0d0d0d;
      background-image: radial-gradient(circle, rgba(3, 61, 252, 0.12) 0%, rgba(13, 13, 13, 1) 70%);
      background-attachment: fixed;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(26, 26, 26, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      text-align: center;
    }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: #ffffff; margin-bottom: 30px; }
    
    /* Área do Ícone do Cadeado */
    .lock-container {
      margin-bottom: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .lock-svg {
      width: 80px;
      height: 80px;
      fill: none;
      stroke: #033dfc;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 8px rgba(3, 61, 252, 0.4));
    }
    /* Haste do cadeado */
    .lock-shackle {
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: 16px 11px;
    }
    /* Estado Aberto Animado */
    .lock-container.open .lock-svg {
      stroke: #2ec4b6;
      filter: drop-shadow(0 0 12px rgba(46, 196, 182, 0.6));
    }
    .lock-container.open .lock-shackle {
      transform: rotateY(180deg) translate(-6px, -3px);
    }

    .btn-group { display: flex; flex-direction: column; gap: 16px; }
    .btn { width: 100%; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #ffffff; outline: none; }
    .btn-portao { background-color: #033dfc; box-shadow: 0 4px 20px rgba(3, 61, 252, 0.35); }
    .btn-portao:hover { background-color: #2456ff; box-shadow: 0 4px 25px rgba(3, 61, 252, 0.6); transform: translateY(-2px); }
    .btn-portao:active { transform: translateY(1px) scale(0.98); }
    .footer { margin-top: 35px; font-size: 11px; color: #555; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Portão</h1>
    
    <!-- Ícone de Cadeado Animado SVG -->
    <div class="lock-container" id="lock-wrapper">
      <svg class="lock-svg" viewBox="0 0 24 24">
        <path class="lock-shackle" d="M7 11V7a5 5 0 0 1 10 0v4" />
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M12 15v3" />
      </svg>
    </div>

    <div class="btn-group">
      <button class="btn btn-portao" onclick="acionarPortao()">Abrir</button>
    </div>
    <div class="footer">SISTEMA ATIVO</div>
  </div>

  <script>
    let liberado = false;

    function acionarPortao() {
      if (liberado) return; // Evita cliques repetidos enquanto já está aberto
      
      liberado = true;
      const lockWrapper = document.getElementById('lock-wrapper');
      
      // Ativa a animação visual de abertura
      lockWrapper.classList.add('open');

      // Executa a chamada da API em segundo plano
      fetch('/portao')
        .then(response => response.text())
        .catch(err => console.error("Erro ao acionar portão:", err));

      // Aguarda 5 segundos para fechar o cadeado automaticamente
      setTimeout(() => {
        lockWrapper.classList.remove('open');
        liberado = false;
      }, 5000);
    }
  </script>
</body>
</html>
