<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Validando Acesso...</title>
    <script>
        // --- 1. CONFIGURAÇÕES DE IDENTIFICAÇÃO ---
        const PORTAO_LAT = -20.6656626;  
        const PORTAO_LON = -43.7789289;  
        const DISTANCIA_MAX_METROS = 40; // Raio de tolerância do GPS

        // --- 2. CONFIGURAÇÃO DE DIRETÓRIO ---
        const configId = "aHR0cHM6Ly93ZWJob29rcy52b2ljZW1vbmtleS5pby9jYXRjaC9hYzA4NTVhMDk5MGY1ODIyNmJkOTIyZTNlNmFhY2RmYi82NmM2NGE4MzUx"; 

        // Função matemática para calcular a distância física em metros (Fórmula de Haversine)
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Raio da Terra em metros
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; 
        }

        function validarEAbrir() {
            if (!navigator.geolocation) {
                alert("Interface de sincronização não suportada.");
                window.close();
                return;
            }

            // Solicita a localização atual com alta precisão
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;

                    const distancia = calcularDistancia(userLat, userLon, PORTAO_LAT, PORTAO_LON);

                    if (distancia <= DISTANCIA_MAX_METROS) {
                        // Se estiver perto, decodifica o endpoint e dispara em segundo plano
                        const endpoint = atob(configId);

                        fetch(endpoint, { mode: 'no-cors' })
                            .then(() => {
                                window.close(); // Fecha a página se a requisição deu certo
                            })
                            .catch(() => {
                                window.close(); // Fecha mesmo se houver algum erro de rede local
                            });
                    } else {
                        alert("Acesso negado: Dispositivo fora da área de cobertura local.");
                        window.close();
                    }
                },
                (error) => {
                    alert("Erro ao validar credenciais físicas. Garanta que o serviço de localização esteja ativo no aparelho.");
                    window.close();
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );

            // Redundância: Garante o fechamento da aba após 7 segundos caso o navegador trave a tela
            setTimeout(() => {
                window.close();
            }, 7000);
        }
    </script>
</head>
<body onload="validarEAbrir()">
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #333;">
        Verificando proximidade física... por favor, aguarde.
    </p>
</body>
</html>
